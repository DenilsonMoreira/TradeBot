services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradebrain_test
      POSTGRES_USER: tradebrain_test
      POSTGRES_PASSWORD: tradebrain-test-only
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradebrain_test -d tradebrain_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  test:
    build:
      context: ./backend
    environment:
      BINANCE_API_KEY: test-only
      BINANCE_API_SECRET: test-only
      BINANCE_TESTNET: "true"
      DATABASE_URL: postgresql+psycopg://tradebrain_test:tradebrain-test-only@test-db:5432/tradebrain_test
      PYTHONPATH: /app
      TZ: America/Fortaleza
    volumes:
      - ./backend/tests:/app/tests:ro
    depends_on:
      test-db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && pytest -q"
