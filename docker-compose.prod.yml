x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  proxy:
    logging: *default-logging
    image: caddy:2.10-alpine
    container_name: tradebrain-proxy
    restart: unless-stopped
    environment:
      TRADEBRAIN_DOMAIN: ${TRADEBRAIN_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    logging: *default-logging
    build:
      context: ./frontend
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: tradebrain-frontend
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    logging: *default-logging
    build:
      context: ./backend
    container_name: tradebot-api
    restart: unless-stopped
    env_file:
      - ${TRADEBRAIN_ENV_FILE:-.env.production}
    environment:
      TZ: America/Fortaleza
      AUTH_COOKIE_SECURE: "true"
      CORS_ORIGINS: https://${TRADEBRAIN_DOMAIN}
    expose:
      - "8000"
    volumes:
      - model_artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=172.16.0.0/12"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    logging: *default-logging
    build:
      context: ./backend
    container_name: tradebot-worker
    restart: unless-stopped
    env_file:
      - ${TRADEBRAIN_ENV_FILE:-.env.production}
    environment:
      TZ: America/Fortaleza
    command: python -m app.workers.trader_worker
    depends_on:
      api:
        condition: service_healthy

  candle-worker:
    logging: *default-logging
    build:
      context: ./backend
    container_name: tradebot-candle-worker
    restart: unless-stopped
    env_file:
      - ${TRADEBRAIN_ENV_FILE:-.env.production}
    environment:
      TZ: America/Fortaleza
    command: python -m app.workers.candle_worker
    volumes:
      - model_artifacts:/app/artifacts
    depends_on:
      api:
        condition: service_healthy

  indicator-worker:
    logging: *default-logging
    build:
      context: ./backend
    container_name: tradebot-indicator-worker
    restart: unless-stopped
    env_file:
      - ${TRADEBRAIN_ENV_FILE:-.env.production}
    environment:
      TZ: America/Fortaleza
    command: python -m app.workers.indicator_worker
    depends_on:
      api:
        condition: service_healthy
      candle-worker:
        condition: service_started

  db:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: tradebot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  model_artifacts:
  caddy_data:
  caddy_config:
