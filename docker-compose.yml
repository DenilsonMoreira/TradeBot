services:
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: tradebrain-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./backend
    container_name: tradebot-api
    env_file:
      - .env
    environment:
      TZ: America/Fortaleza      
      RESEARCH_AUTOMATION_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - model_artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    container_name: tradebot-worker
    env_file:
      - .env
    environment:
      TZ: America/Fortaleza            
    command: python -m app.workers.trader_worker
    volumes:
      - ./backend/app:/app/app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  candle-worker:
    build:
      context: ./backend
    container_name: tradebot-candle-worker
    env_file:
      - .env
    environment:
      TZ: America/Fortaleza
    command: python -m app.workers.candle_worker
    volumes:
      - ./backend/app:/app/app
      - model_artifacts:/app/artifacts
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  indicator-worker:
    build:
      context: ./backend
    container_name: tradebot-indicator-worker
    env_file:
      - .env
    environment:
      TZ: America/Fortaleza
    command: python -m app.workers.indicator_worker
    volumes:
      - ./backend/app:/app/app
    depends_on:
      api:
        condition: service_healthy
      candle-worker:
        condition: service_started
    restart: unless-stopped

  trainer-worker:
    build:
      context: ./backend
    container_name: tradebot-trainer-worker
    env_file:
      - .env
    environment:
      TZ: America/Fortaleza
      RESEARCH_AUTOMATION_ENABLED: "true"
    command: python -m app.workers.trainer_worker
    volumes:
      - ./backend/app:/app/app
      - model_artifacts:/app/artifacts
    depends_on:
      api:
        condition: service_healthy
      candle-worker:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tradebot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  model_artifacts:
